server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  main:
    allow-circular-references: true
  application:
    name: yinbo-music
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yinbo_music?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
      database: 1
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  messages:
    encoding: UTF-8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yinbo.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minio
  secret-key: 12345678
  bucket-name:
    main: yinbomusic

jwt:
  secret: yinbo-music-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000
  refresh-expiration: 604800000
  header: Authorization
  prefix: "Bearer "

logging:
  level:
    com.yinbo: debug
    org.springframework.security: info