server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  main:
    allow-circular-references: true
  application:
    name: yinbo-music
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yinbo_music?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      # 无密码时请整行删除，勿留 password:
      # password: 123456
      database: 1
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  messages:
    encoding: UTF-8
  # 邮件（邮箱验证码）— QQ 必须用 587 + STARTTLS；勿用 465，勿设 SPRING_MAIL_PORT=465
  mail:
    host: smtp.qq.com
    port: 587
    default-encoding: UTF-8
    username: '2651906780@qq.com'
    password: ${SPRING_MAIL_PASSWORD:brlbmljkaqbgeade}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000
          starttls:
            enable: true
            required: true
          ssl:
            # 587 为「先明文连上再 STARTTLS 升级」，此处勿开整链路 SSL
            enable: false
            trust: smtp.qq.com
            protocols: TLSv1.2

yinbo:
  mail:
    from-name: 音波音乐
  search:
    # 首次增加 search_norm 列后可设为 true 启动一次以回填现有曲目/歌手，完成后改回 false
    backfill-on-startup: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yinbo.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minio
  secret-key: 12345678
  bucket-name:
    main: yinbomusic

jwt:
  secret: yinbo-music-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000
  refresh-expiration: 604800000
  header: Authorization
  prefix: "Bearer "

logging:
  level:
    com.yinbo: debug
    org.springframework.security: info