version: '3.8'

services:
  # MySQL鑒앴욋
  mysql:
    image: mysql:8.0
    container_name: yinbo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yinbo_music
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./YinBo-Server/src/main/resources/db/yinbo_music.sql:/docker-entrypoint-initdb.d/01-yinbo_music.sql
    command: --default-authentication-plugin=mysql_native_password

  # Redis뻠닸
  redis:
    image: redis:7-alpine
    container_name: yinbo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # MinIO뚤蹶닸뇨
  minio:
    image: minio/minio:latest
    container_name: yinbo-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # 빈똥륩蛟
  backend:
    build:
      context: ./YinBo-Server
      dockerfile: Dockerfile
    container_name: yinbo-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/yinbo_music?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      - mysql
      - redis
      - minio

  # 품똥륩蛟（역랙친駕）
  frontend:
    build:
      context: ./YinBo-Client
      dockerfile: Dockerfile
    container_name: yinbo-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    volumes:
      - ./YinBo-Client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  mysql_data:
  redis_data:
  minio_data:
